repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: python -m ruff check .
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: python -m mypy redline tests scripts examples
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: python -m pytest -q
        language: system
        pass_filenames: false
      - id: diff-check
        name: git diff --check
        entry: git diff --check
        language: system
        pass_filenames: false
