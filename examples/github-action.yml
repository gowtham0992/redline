name: redline

on:
  pull_request:
    paths:
      - "prompts/**"
      - "**/*.jsonl"
      - "redline.json"
      - "redline-suite.json"
      - "redline-prompts.json"
      - "suites/**"
      - "redline.schema.json"
      - "redline-suite.schema.json"
      - "redline-report.schema.json"

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install redline
        run: python -m pip install redline-ai

      - name: Check redline setup
        run: python -m redline doctor --strict

      - name: Prepare redline suite
        run: |
          suite_path="$(python -c 'import json, pathlib; config_path = pathlib.Path("redline.json"); config = json.loads(config_path.read_text(encoding="utf-8")) if config_path.exists() else {}; print(config.get("suite") or ("redline-prompts.json" if pathlib.Path("redline-prompts.json").exists() else "redline-suite.json"))')"
          suite_schema="$(python -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("schema", ""))' "$suite_path")"
          echo "REDLINE_SUITE_PATH=$suite_path" >> "$GITHUB_ENV"
          echo "REDLINE_SUITE_SCHEMA=$suite_schema" >> "$GITHUB_ENV"
          if [ "$suite_schema" = "redline-prompt-manifest-v1" ]; then
            manifest_root="$(python -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("root", "prompts"))' "$suite_path")"
            manifest_suite_dir="$(python -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("suite_dir", "suites"))' "$suite_path")"
            python -m redline prompts "$manifest_root" \
              --suite-dir "$manifest_suite_dir" \
              --out "$suite_path" \
              --check \
              --check-suites
          else
            python -m redline validate "$suite_path" --strict
          fi

      - name: Benchmark redline suite
        run: |
          python -m redline benchmark "$REDLINE_SUITE_PATH" \
            --measure-local \
            --github-summary \
            --out-json .redline/reports/benchmark.json \
            --out-md .redline/reports/benchmark.md

      - name: Run redline eval
        run: |
          python -m redline eval "$REDLINE_SUITE_PATH" \
            --compact \
            --github-annotations \
            --out-json .redline/reports/eval.json \
            --out-md .redline/reports/eval.md \
            --out-comment .redline/reports/eval-comment.md \
            --out-html .redline/reports/eval.html \
            --out-junit .redline/reports/eval.xml
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ] && [ -f .redline/reports/eval-comment.md ]; then
            cat .redline/reports/eval-comment.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Compare redline trend
        if: always()
        run: |
          if [ -f .redline/reports/eval-before.json ]; then
            python -m redline compare \
              .redline/reports/eval-before.json \
              .redline/reports/eval.json \
              --out-json .redline/reports/compare.json \
              --out-md .redline/reports/compare.md \
              --out-html .redline/reports/compare.html \
              --github-summary \
              --fail-on worse,new
          else
            echo "No previous redline report found at .redline/reports/eval-before.json; skipping compare."
          fi

      - name: Record redline history
        if: always()
        run: |
          if [ -f .redline/reports/eval.json ]; then
            python -m redline history \
              .redline/reports/eval.json \
              --label "${{ github.sha }}" \
              --out .redline/history.jsonl \
              --out-md .redline/history.md \
              --github-summary
          else
            echo "No redline eval report found at .redline/reports/eval.json; skipping history."
          fi

      - name: Write redline audit checkpoint
        if: always()
        run: python -m redline audit --verify --out-checkpoint .redline/audit-checkpoint.json

      - name: Render redline dashboard
        if: always()
        run: python -m redline dashboard --out .redline/dashboard.html

      - name: Upload redline reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redline-reports
          path: |
            .redline/reports/
            .redline/history.jsonl
            .redline/history.md
            .redline/dashboard.html
            .redline/audit-checkpoint.json
