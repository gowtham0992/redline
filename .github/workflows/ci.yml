name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test and certify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Check shell scripts
        run: bash -n scripts/*.sh

      - name: Run tests
        run: python -m pytest -q

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run mypy
        run: python -m mypy redline tests scripts examples

      - name: Smoke external project action flow
        run: bash scripts/action_smoke.sh

      - name: Build release artifacts
        run: bash scripts/build_release.sh "$RUNNER_TEMP/redline-dist"
