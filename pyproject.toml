[project]
name = "redline-local"
version = "0.1.0"
description = "Local-first prompt regression diffs from existing JSONL logs."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["llm", "evals", "prompts", "regression-testing"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Topic :: Software Development :: Testing",
]
dependencies = []

[project.scripts]
redline = "redline.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
